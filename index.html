<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 獵人 30.0 - 全自主診斷終端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #d1d4dc; padding: 20px; }
        .card { background: #161a1e; border-radius: 12px; border: 1px solid #2b2f36; padding: 25px; max-width: 950px; margin: auto; }
        .input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.85em; color: #848e9c; }
        .input-box { background: #0b1116; border: 1px solid #474d57; color: #fff; padding: 12px; border-radius: 6px; }
        .btn-run { background: #f0b90b; color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 6px; cursor: pointer; grid-column: span 4; font-size: 1.1em; margin-top: 10px; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .res-box { background: #0b1e2d; padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid #3498db; }
        .val { font-size: 22px; font-weight: bold; color: #fff; display: block; }
        .chart-container { background: #1e2329; padding: 15px; border-radius: 8px; height: 400px; }
    </style>
</head>
<body>
<div class="card">
    <div class="input-grid">
        <div class="input-group"><label>標代號</label><input type="text" id="sym" class="input-box" placeholder="如: NVDA"></div>
        <div class="input-group"><label>目前現價 (P)</label><input type="number" id="curP" class="input-box" placeholder="輸入最新價"></div>
        <div class="input-group"><label>9/18 IV (%)</label><input type="number" id="curIV" class="input-box" placeholder="輸入 IV"></div>
        <div class="input-group"><label>2026 EPS (虧損填負)</label><input type="number" id="curE" class="input-box" placeholder="估值參考"></div>
        <button class="btn-run" onclick="run300()">啟動實時數據建模</button>
    </div>

    <div id="resLayout" style="display:none;">
        <div class="res-grid">
            <div class="res-box"><span id="vWin" class="val">--</span><span class="label">180D 生存率</span></div>
            <div class="res-box"><span id="vS1" class="val">--</span><span class="label">1σ (正常波動底)</span></div>
            <div class="res-box" style="border-top-color:#e74c3c"><span id="vS2" class="val">--</span><span class="label">2σ (崩盤物理底)</span></div>
        </div>
        <div class="chart-container"><canvas id="mcChart"></canvas></div>
        <div id="audit" style="margin-top:20px; line-height:1.6; color:#f0b90b;"></div>
    </div>
</div>

<script>
let chart;
function run300() {
    const p0 = parseFloat(document.getElementById('curP').value);
    const ivRaw = parseFloat(document.getElementById('curIV').value);
    const eps = parseFloat(document.getElementById('curE').value);
    if (!p0 || !ivRaw) { alert("資訊不足，獵人無法開火。"); return; }

    const iv = ivRaw / 100;
    let win = 0; let paths = [];
    for (let i = 0; i < 3000; i++) {
        let p = p0; let path = [p0];
        for (let d = 0; d < 180; d++) {
            p *= Math.exp((0.04 - 0.5 * iv * iv) * (1/252) + iv * Math.sqrt(1/252) * (Math.random()*2-1)*1.732);
            if (i < 30) path.push(p);
        }
        if (p > p0) win++; if (i < 30) paths.push(path);
    }

    const s1 = (p0 * Math.exp(-iv * Math.sqrt(180/365) * 1)).toFixed(2);
    const s2 = (p0 * Math.exp(-iv * Math.sqrt(180/365) * 2)).toFixed(2);

    document.getElementById('resLayout').style.display = 'block';
    document.getElementById('vWin').innerText = (win/3000*100).toFixed(1) + "%";
    document.getElementById('vS1').innerText = "$" + s1;
    document.getElementById('vS2').innerText = "$" + s2;

    const peText = eps > 0 ? (p0/eps).toFixed(1) + "x PE" : "虧損中 (請評估前景)";
    document.getElementById('audit').innerHTML = `<b>📊 綜合診斷：</b> 估值為 ${peText}。若現價跌至 <span style="color:#fff">$${s1}</span> 屬於正常波動區。`;

    updateChart(paths, s2);
}

function updateChart(paths, s2) {
    const ctx = document.getElementById('mcChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: 181}, (_, i) => i),
            datasets: paths.map(p => ({ data: p, borderColor: p[180] > paths[0][0] ? 'rgba(14,203,129,0.3)' : 'rgba(246,70,93,0.3)', borderWidth: 1, pointRadius: 0, fill: false }))
            .concat([{ label: '2σ', data: Array(181).fill(s2), borderColor: '#e74c3c', borderDash: [5,5], borderWidth: 2, pointRadius: 0 }])
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}
</script>
</body>
</html>
