<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 獵人 9.0 - 籌碼與願望拆解版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #d1d4dc; padding: 20px; }
        .card { background: #161a1e; border-radius: 12px; border: 1px solid #2b2f36; padding: 25px; max-width: 1000px; margin: auto; }
        .grid-main { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .data-panel { background: #1e2329; padding: 20px; border-radius: 8px; border: 1px solid #343d4b; margin-bottom: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75em; color: #848e9c; margin-bottom: 5px; text-transform: uppercase; }
        input, select { background: #2b3139; border: 1px solid #474d57; color: #fff; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .btn-run { background: #f0b90b; color: #000; font-weight: bold; border: none; padding: 18px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 1.2em; }
        .monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .monitor-box { background: #0b1e2d; padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid #3498db; }
        .val { font-size: 24px; font-weight: bold; color: #fff; display: block; }
        .chart-container { background: #1e2329; padding: 15px; border-radius: 8px; margin-top: 25px; height: 450px; }
        .advice-section { background: #2b3139; padding: 20px; border-radius: 8px; margin-top: 25px; border-left: 10px solid #f0b90b; }
        .highlight { color: #f0b90b; font-weight: bold; }
        .wall-color { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>🛡️ 獵人 9.0：籌碼實體牆 vs 報仇願望價</h2>
    
    <div class="grid-main">
        <div class="input-group"><label>標的名稱</label><input type="text" id="name" value="MU"></div>
        <div class="input-group"><label>快速數據載入</label><select id="s" onchange="ld()"><option value="custom">-- 自定義 --</option><option value="NVDA">NVDA</option><option value="META">META</option><option value="LEU">LEU</option><option value="MU">MU</option></select></div>
        <div class="input-group"><label>目前現價</label><input type="number" id="p" value="400"></div>
        <div class="input-group"><label>大盤 VIX</label><input type="number" id="vix" value="21.5"></div>
    </div>

    <div class="data-panel">
        <div class="input-group"><label>預估 EPS</label><input type="number" id="e" value="18.5" step="0.1"></div>
        <div class="input-group"><label>實時 IV (%)</label><input type="number" id="iv" value="70"></div>
        <div class="input-group"><label>支撐 PE</label><input type="number" id="pe" value="12"></div>
        <div class="input-group"><label>實體籌碼牆 (POC)</label><input type="number" id="poc" value="345"></div>
        <div class="input-group"><label>你的報仇價</label><input type="number" id="target" value="320"></div>
    </div>

    <button class="btn-run" onclick="run9()">啟動雙線共振診斷</button>

    <div class="monitor-grid">
        <div class="monitor-box"><span id="resWin" class="val">--</span>半年生存率</div>
        <div class="monitor-box"><span id="resPE" class="val">--</span>目前 PE</div>
        <div class="monitor-box"><span id="resAdj" class="val">--</span>校準後 PE</div>
        <div class="monitor-box"><span id="resSafe" class="val">--</span>震盪保護位</div>
    </div>

    <div class="chart-container"><canvas id="mcChart"></canvas></div>
    <div id="advice" class="advice-section" style="display:none;"></div>
</div>

<script>
let chart;
const db = {
    "NVDA": [177, 46, 5.15, 30, 142], "META": [645, 32, 30.2, 21, 605],
    "LEU": [202, 88, 7.5, 17, 132], "MU": [400, 70, 18.5, 12, 345]
};

function ld() {
    const s = document.getElementById('s').value; if(s === "custom") return;
    const d = db[s]; document.getElementById('name').value = s;
    document.getElementById('p').value=d[0]; document.getElementById('iv').value=d[1];
    document.getElementById('e').value=d[2]; document.getElementById('pe').value=d[3]; 
    document.getElementById('poc').value=d[4]; document.getElementById('target').value=d[4] - 10;
}

function run9() {
    const p0 = parseFloat(document.getElementById('p').value), eps = parseFloat(document.getElementById('e').value);
    const iv0 = parseFloat(document.getElementById('iv').value)/100, basePE = parseFloat(document.getElementById('pe').value);
    const poc = parseFloat(document.getElementById('poc').value), target = parseFloat(document.getElementById('target').value);
    const vix = parseFloat(document.getElementById('vix').value);
    
    let win = 0, trials = 3000, paths = [], hitTarget = 0;
    for (let i = 0; i < trials; i++) {
        let p = p0, civ = iv0, path = [p0], touched = false;
        for (let d = 0; d < 180; d++) {
            civ = civ + (0.4 - civ) * 0.005;
            p *= Math.exp((0.04 - 0.5 * civ * civ) * (1/252) + civ * Math.sqrt(1/252) * (Math.random()*2-1)*1.732);
            if (p <= target) touched = true;
            if (i < 30) path.push(p);
        }
        if (p > p0) win++; if (touched) hitTarget++; if (i < 30) paths.push(path);
    }
    
    const hitRate = (hitTarget/trials*100).toFixed(1);
    const curPE = (p0/eps).toFixed(1), vixAdj = vix > 20 ? (vix-20)*0.5 : 0, adjPE = (basePE-vixAdj).toFixed(1);
    const sigmaWall = (p0 * (1 - iv0 * 0.25)).toFixed(1);

    document.getElementById('resWin').innerText = (win/trials*100).toFixed(1) + "%";
    document.getElementById('resPE').innerText = curPE + "x";
    document.getElementById('resAdj').innerText = adjPE + "x";
    document.getElementById('resSafe').innerText = "$" + sigmaWall;

    updateChart(paths, poc, target);
    showAdvice(win/trials*100, p0, target, poc, hitRate);
}

function updateChart(paths, poc, target) {
    const ctx = document.getElementById('mcChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: 181}, (_, i) => i),
            datasets: paths.map((p, i) => ({ data: p, borderColor: p[180] > paths[0][0] ? 'rgba(14,203,129,0.2)' : 'rgba(246,70,93,0.2)', borderWidth: 1, pointRadius: 0, fill: false }))
            .concat([
                { label: '實體籌碼牆 (POC)', data: Array(181).fill(poc), borderColor: '#3498db', borderDash: [2,2], borderWidth: 3, pointRadius: 0 },
                { label: '主觀報仇價', data: Array(181).fill(target), borderColor: '#ffffff', borderDash: [5,5], borderWidth: 2, pointRadius: 0 }
            ])
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#2b2f36' } }, x: { grid: { display: false } } } }
    });
}

function showAdvice(wr, p0, target, poc, hitRate) {
    const adv = document.getElementById('advice'); adv.style.display = 'block';
    const gap = ((poc - target)/poc * 100).toFixed(1);
    adv.innerHTML = `<h3>📢 獵人 9.0 執行指令</h3>
        <li><b>成交難度診斷</b>：你的報仇價低於籌碼牆 <b class="highlight">${gap}%</b>。半年內觸及率為 <b class="highlight">${hitRate}%</b>。</li>
        <li><b>實體牆防禦</b>：大資金在 <b class="wall-color">$${poc}</b> 佈防。若此牆不破，你的報仇單將無法成交。</li>
        <hr>
        <div style="font-size:1.1em;"><b>執行建議</b>：建議將 30% 資金上移至 <b class="wall-color">$${poc}</b> 確保有貨，剩下子彈再等 <b class="highlight">$${target}</b> 的極端插針。</div>`;
}
</script>
</body>
</html>
