<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 獵人終極系統 8.0 - FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #d1d4dc; padding: 20px; }
        .card { background: #161a1e; border-radius: 12px; border: 1px solid #2b2f36; padding: 25px; max-width: 1000px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .data-panel { background: #1e2329; padding: 20px; border-radius: 8px; border: 1px solid #343d4b; margin-bottom: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.8em; color: #848e9c; margin-bottom: 5px; }
        input, select { background: #2b3139; border: 1px solid #474d57; color: #fff; padding: 10px; border-radius: 4px; }
        .btn-run { background: #f0b90b; color: #000; font-weight: bold; border: none; padding: 18px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .btn-run:hover { background: #e67e22; transform: translateY(-2px); }
        .monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .monitor-box { background: #0b1e2d; padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid #3498db; }
        .val { font-size: 28px; font-weight: bold; color: #fff; display: block; }
        .chart-container { background: #1e2329; padding: 15px; border-radius: 8px; margin-top: 25px; height: 450px; }
        .advice-section { background: #2b3139; padding: 20px; border-radius: 8px; margin-top: 25px; border-left: 10px solid #f0b90b; line-height: 1.6; }
    </style>
</head>
<body>
<div class="card">
    <h2>🛡️ 獵人 8.0：終極完全體系統</h2>
    
    <div class="grid-3">
        <div class="input-group"><label>1. 選擇獵物</label><select id="s" onchange="ld()"><option value="custom">-- 自定義 --</option><option value="NVDA">NVDA (AI 龍頭)</option><option value="META">META (廣告變現)</option><option value="LEU">LEU (核能轉機)</option><option value="MU">MU (記憶體週期)</option></select></div>
        <div class="input-group"><label>目前現價 (P)</label><input type="number" id="p" value="400"></div>
        <div class="input-group"><label>大盤 VIX</label><input type="number" id="vix" value="21.5"></div>
    </div>

    <div class="data-panel">
        <div class="input-group"><label>預估 EPS (E)</label><input type="number" id="e" value="18.5" step="0.1"></div>
        <div class="input-group"><label>實時 IV (%)</label><input type="number" id="iv" value="52"></div>
        <div class="input-group"><label>歷史支撐 PE</label><input type="number" id="pe" value="12"></div>
        <div class="input-group"><label>報仇價/籌碼牆</label><input type="number" id="t" value="345"></div>
    </div>

    <button class="btn-run" onclick="run8()">啟動終極執行診斷</button>

    <div class="monitor-grid">
        <div class="monitor-box"><span id="resWin" class="val">--</span>半年生存率</div>
        <div class="monitor-box"><span id="resPE" class="val">--</span>目前 PE</div>
        <div class="monitor-box"><span id="resAdj" class="val">--</span>校準後 PE</div>
        <div class="monitor-box"><span id="resSafe" class="val">--</span>震盪保護位</div>
    </div>

    <div class="chart-container"><canvas id="mcChart"></canvas></div>
    <div id="advice" class="advice-section" style="display:none;"></div>
</div>

<script>
let chart;
const db = {
    "NVDA": [177, 46, 5.15, 30, 142], "META": [645, 32, 30.2, 21, 605],
    "LEU": [202, 88, 7.5, 17, 132], "MU": [400, 52, 18.5, 12, 345]
};

function ld() {
    const s = document.getElementById('s').value; if(s === "custom") return;
    const d = db[s]; document.getElementById('p').value=d[0]; document.getElementById('iv').value=d[1];
    document.getElementById('e').value=d[2]; document.getElementById('pe').value=d[3]; document.getElementById('t').value=d[4];
}

function run8() {
    const p0 = parseFloat(document.getElementById('p').value), eps = parseFloat(document.getElementById('e').value);
    const iv0 = parseFloat(document.getElementById('iv').value)/100, basePE = parseFloat(document.getElementById('pe').value);
    const target = parseFloat(document.getElementById('t').value), vix = parseFloat(document.getElementById('vix').value);
    
    // 1. 蒙地卡羅 + IV 衰減回歸
    let win = 0, trials = 3000, paths = [];
    for (let i = 0; i < trials; i++) {
        let p = p0, civ = iv0, path = [p0];
        for (let d = 0; d < 180; d++) {
            civ = civ + (0.4 - civ) * 0.005; // IV 向 40% 均值回歸
            p *= Math.exp((0.04 - 0.5 * civ * civ) * (1/252) + civ * Math.sqrt(1/252) * (Math.random()*2-1)*1.732);
            if (i < 30) path.push(p);
        }
        if (p > p0) win++; if (i < 30) paths.push(path);
    }
    const winRate = (win/trials*100).toFixed(1);
    
    // 2. 數據核對
    const curPE = (p0/eps).toFixed(1), vixAdj = vix > 20 ? (vix-20)*0.5 : 0, adjPE = (basePE-vixAdj).toFixed(1);
    const sigmaWall = (p0 * (1 - iv0 * 0.25)).toFixed(1);

    document.getElementById('resWin').innerText = winRate + "%";
    document.getElementById('resPE').innerText = curPE + "x";
    document.getElementById('resAdj').innerText = adjPE + "x";
    document.getElementById('resSafe').innerText = "$" + sigmaWall;

    updateChart(paths, target);
    showAdvice(winRate, p0, target, sigmaWall);
}

function updateChart(paths, target) {
    const ctx = document.getElementById('mcChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: 181}, (_, i) => i),
            datasets: paths.map((p, i) => ({ data: p, borderColor: p[180] > paths[0][0] ? 'rgba(14,203,129,0.2)' : 'rgba(246,70,93,0.2)', borderWidth: 1, pointRadius: 0, fill: false }))
            .concat([{ label: '目標價/籌碼牆', data: Array(181).fill(target), borderColor: '#f0b90b', borderDash: [5,5], borderWidth: 2, pointRadius: 0 }])
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#2b2f36' } }, x: { grid: { display: false } } } }
    });
}

function showAdvice(wr, p0, target, sw) {
    const adv = document.getElementById('advice'); adv.style.display = 'block';
    let size = wr < 45 ? "10% (防踏空用)" : (wr < 65 ? "30% (分批佈局)" : "60% (核心重倉)");
    adv.innerHTML = `<h3>📢 獵人執行指令</h3>
        <li><b>生存檢測</b>：半年勝率僅 <b class="highlight">${wr}%</b>。數據顯示現價買入並無統計優勢。</li>
        <li><b>震盪防線</b>：短期回撤至 <b class="highlight">$${sw}</b> 均屬正常波動，若未跌破此位不應恐慌。</li>
        <hr>
        <div style="font-size:1.2em;"><b>執行建議</b>：建議目前投入 <b class="highlight">${size}</b> 資金。主力子彈死守 <b class="highlight">$${target}</b>。</div>`;
}
</script>
</body>
</html>
